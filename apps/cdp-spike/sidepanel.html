<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CDP Spike (M0)</title>
    <style>
      body { font: 13px/1.45 system-ui, sans-serif; margin: 0; padding: 12px; }
      h1 { font-size: 14px; margin: 0 0 4px; }
      p { margin: 0 0 10px; color: #666; }
      button { display: block; width: 100%; margin: 4px 0; padding: 8px; font-size: 13px; cursor: pointer; border-radius: 6px; border: 1px solid #ccc; background: #f7f7f7; }
      button:hover { background: #eee; }
      #log { white-space: pre-wrap; background: #141414; color: #d6d6ff; padding: 10px; border-radius: 6px; margin-top: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; max-height: 62vh; overflow: auto; }
      #log > div { margin: 0 0 2px; }
      .ok { color: #7ee787; }
      .fail { color: #ff7b72; }
    </style>
  </head>
  <body>
    <h1>CDP Spike (M0)</h1>
    <p>Open a tab you're logged into, then Attach and Probe.</p>
    <button id="attach">1 · Attach to active tab</button>
    <button id="probe">2 · Probe CDP surface</button>
    <button id="a11y">A11y tree sample</button>
    <button id="screenshot">Screenshot</button>
    <button id="detach">Detach</button>
    <div id="log"></div>
    <script src="sidepanel.js"></script>
  </body>
</html>
